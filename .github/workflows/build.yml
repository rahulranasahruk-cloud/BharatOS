name: BharatOS-Builder
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build xorriso squashfs-tools

      - name: Build ISO
        run: |
          mkdir -p build && cd build
          # Minimal config to ensure it passes the server check
          lb config --architecture amd64 --distribution bookworm --binary-images iso-hybrid
          mkdir -p config/package-lists
          echo "xfce4 lightdm firefox-esr" > config/package-lists/bharat.list.chroot
          sudo lb build

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BharatOS-ISO
          path: build/*.iso
