name: BharatOS-Builder
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged # This is the "Magic Key" for permissions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          apt-get update
          apt-get install -y live-build xorriso squashfs-tools

      - name: Build ISO
        run: |
          mkdir -p build && cd build
          lb config --architecture amd64 --distribution bookworm --binary-images iso-hybrid
          mkdir -p config/package-lists
          echo "xfce4 lightdm firefox-esr fonts-indic" > config/package-lists/bharat.list.chroot
          lb build

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BharatOS-ISO
          path: build/*.iso
